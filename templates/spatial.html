
<style>
    .video-container {
        width: 90%;
        max-width: 640px;
        max-height: 480px; 
        margin: 0 auto;

        overflow: auto;
    }

    #video {
        max-width: 100%;
        max-height: 100%;  
        height: auto;      
        width: auto;       
        display: block;
        margin: 0 auto;
        object-fit: contain; 
    }


    /* Container + card */
    .position-info-section {
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 12px 14px;
    margin: 12px 0;
    background: #fff;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    /* Title */
    .position-info-section > h3 {
    margin: 0 0 8px 0;
    font-size: 16px;
    font-weight: 600;
    color: #0f172a;
    }

    /* Connection status */
    .motion-status {
    font-size: 14px;
    margin-bottom: 8px;
    padding: 6px 8px;
    border-radius: 6px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    color: #334155;
    }
    .motion-status.connected {
    border-color: #22c55e;
    background: #f0fdf4;
    color: #14532d;
    }
    .motion-status.disconnected {
    border-color: #ef4444;
    background: #fef2f2;
    color: #7f1d1d;
    }

    /* Message box */
    .motion-message {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    font-size: 13px;
    line-height: 1.5;
    padding: 10px;
    border: 1px solid #e2e8f0;
    border-radius: 6px;
    background: #ffffff;
    color: #0f172a;
    overflow-x: auto;
    }

    /* Key–value renderer used by the plugin */
    .kv-list {
    display: grid;
    grid-template-columns: 220px 1fr;
    gap: 6px 10px;
    }
    .kv-row { display: contents; }
    .kv-row .k { font-weight: 600; color: #334155; }
    .kv-row .v { color: #0f172a; }

    .meta {
    margin-top: 8px;
    font-size: 12px;
    color: #64748b;
    border-top: 1px dashed #e2e8f0;
    padding-top: 6px;
    }    

    /* Optional: compact on small screens */
    @media (max-width: 640px) {
    .kv-list { grid-template-columns: 1fr; }
    }


    /* ===== Axis table (x / y / z layout) ===== */

    .axis-table {
    display: flex;
    flex-direction: column;
    gap: 6px;                 /* vertical breathing room */
    margin-top: 4px;
    }

    /* Each row */
    .axis-row {
    display: grid;
    grid-template-columns: 160px repeat(3, minmax(60px, 1fr));
    align-items: center;
    column-gap: 12px;
    padding: 4px 0;
    }

    /* Header row */
    .axis-header {
    font-weight: 600;
    font-size: 12px;
    color: #475569;
    border-bottom: 1px solid #e2e8f0;
    padding-bottom: 6px;
    margin-bottom: 2px;
    }

    /* Left-side labels (direction, speed_rpm, etc.) */
    .axis-label {
    color: #64748b;
    font-weight: 500;
    white-space: nowrap;
    }

    /* Value cells */
    .axis-col {
    text-align: center;
    padding: 4px 6px;
    border-radius: 4px;
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    }

    /* Alternating rows for readability */
    .axis-row:not(.axis-header):nth-child(even) .axis-col {
    background: #ffffff;
    }

    /* Status coloring (optional but very helpful visually) */
    .axis-col:has(:not(:empty)) {
    font-weight: 500;
    }

    .axis-col:where(:contains("standby")) {
    color: #64748b;
    }

    .axis-col:where(:contains("off")) {
    color: #991b1b;
    background: #fef2f2;
    border-color: #fecaca;
    }

    /* ===== Small screens ===== */
    @media (max-width: 640px) {
    .axis-row {
        grid-template-columns: 120px repeat(3, 1fr);
        font-size: 12px;
    }

    .axis-col {
        padding: 3px 4px;
    }
    }


    /* ================= Control Panel ================= */

    .joystick-control-panel{
    display: flex;
    gap: 20px;
    align-items: center;
    padding: 10px;
    }

    /* Stack nicely on small screens */
    @media (max-width: 600px) {
    .joystick-control-panel{
        flex-direction: column;
        align-items: center;
    }
    }

    /* Disabled visual state */
    .joystick-control-panel.disabled{
    opacity: 0.5;
    }

    .joystick-control-panel.disabled .joy,
    .joystick-control-panel.disabled .z-btn{
    pointer-events: none;
    }

    /* ================= Joystick ================= */

    .joy{
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: #eee;
    position: relative;
    touch-action: none;
    border: 2px solid #ccc;
    user-select: none;
    -webkit-user-select: none;
    }

    .knob{
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: #bbb;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    user-select: none;
    -webkit-user-select: none;
    }

    /* ================= Z Axis Buttons ================= */

    .z-controls{
    display: flex;
    flex-direction: column;
    gap: 10px;
    }

    .z-btn{
    width: 60px;
    height: 60px;
    font-size: 28px;
    border-radius: 10px;
    border: 2px solid #ccc;
    background: #f5f5f5;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    }

    .z-btn:active{
    background: #ddd;
    }

    /* ================= Output / Debug ================= */

    .out{
    min-width: 220px;
    font-family: monospace;
    font-size: 14px;
    color: #333;
    }

    /* ================= move to control panel ================= */

  .moveto-control-panel{
  display:flex;
  flex-wrap: wrap;
  gap:10px;
  align-items:flex-end;
  padding:10px;
  }

  .moveto-row{
    display:flex;
    flex-direction:column;
    gap:6px;
  }

  .moveto-row label{
    font-size:12px;
    color:#666;
  }

  .moveto-control-panel input{
    width:110px;
    padding:8px;
    border:2px solid #ccc;
    border-radius:8px;
  }

  .moveto-send{
    padding:10px 14px;
    border-radius:10px;
    border:2px solid #ccc;
    background:#1100ff;
    cursor:pointer;
  }

  .moveto-send:active{ background:#ddd; }

  .moveto-status{
    margin-left:10px;
    font-family: monospace;
    font-size: 12px;
    color:#333;
  }

  .moveto-current{
    margin-top: 8px;
    font-family: monospace;
    font-size: 12px;
    color: #333;
    flex-basis: 100%;
  }
  .moveto-cur-stale{
    margin-left: 6px;
    color: #a00;
  }

  /* ================= teach pendant panel ================= */

  .teach-panel{ padding:12px; border:2px solid #ddd; border-radius:12px; max-width: 920px; }
  .teach-header{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .teach-title{ font-weight:600; margin-right:10px; }
  .teach-meta{ margin-top:10px; font-family: monospace; font-size:12px; color:#333; }
  .teach-cur-stale{ margin-left:6px; color:#a00; }
  .teach-cur-ts{ margin-left:8px; opacity:0.8; }

  .teach-table-wrap{ margin-top:12px; overflow:auto; }
  .teach-table{ width:100%; border-collapse:collapse; font-size:14px; }
  .teach-table th, .teach-table td{ border-bottom:1px solid #eee; padding:8px; text-align:left; }
  .teach-table th{ font-size:12px; color:#666; }

  .teach-table input{
    width:110px; padding:7px; border:2px solid #ccc; border-radius:8px;
  }

  .teach-btn{
    padding:8px 10px; border-radius:10px; border:2px solid #ccc;
    background:#f5f5f5; cursor:pointer; margin-right:6px;
  }
  .teach-btn:active{ background:#ddd; }
  .teach-btn[disabled]{ opacity:0.5; cursor:not-allowed; }

  .teach-status{ margin-top:10px; font-family: monospace; font-size:12px; color:#333; }
  .teach-row-active{ outline: 2px solid #cde; outline-offset: -2px; }
  .teach-row-locked{ opacity: 0.8; }

</style>

</div>

    <img id="video" src="{{panel_config["camera_server"]["set_to"]}}/video_feed">
</div>

    <div class="motion-status" data-device="motor_driver"></div>

</div>

<div class="moveto-control-panel" control-device="motor_driver">
  <div class="moveto-current">
    Pose: 
    X=<span class="moveto-cur-x">—</span> mm,
    Y=<span class="moveto-cur-y">—</span> mm,
    Z=<span class="moveto-cur-z">—</span> mm
    <span class="moveto-cur-stale"></span>
    <span class="moveto-cur-ts"></span>
  </div>

  <div class="moveto-row">
    <label>X</label>
    <input class="moveto-x" type="number" step="1" placeholder="mm">
  </div>

  <div class="moveto-row">
    <label>Y</label>
    <input class="moveto-y" type="number" step="1" placeholder="mm">
  </div>

  <div class="moveto-row">
    <label>Z</label>
    <input class="moveto-z" type="number" step="1" placeholder="mm">
  </div>

  <div class="moveto-row">
    <label>Velocity</label>
    <input class="moveto-v" type="number" step="1" min="0" placeholder="mm/s">
  </div>

  <button class="moveto-send">Send</button>
  <div class="moveto-status"></div>
</div>

<div class="teach-panel" control-device="motor_driver">
  <div class="teach-header">
    <div class="teach-title">Teach Sequence</div>
    <button class="teach-start">Start Teaching</button>
    <button class="teach-stop" disabled>Stop</button>
    <button class="teach-savejson" disabled>Save Sequence (JSON)</button>
  </div>

  <div class="teach-meta">
    Current Pose:
    X=<span class="teach-cur-x">—</span>,
    Y=<span class="teach-cur-y">—</span>,
    Z=<span class="teach-cur-z">—</span>
    <span class="teach-cur-stale"></span>
    <span class="teach-cur-ts"></span>
  </div>

  <div class="teach-table-wrap">
    <table class="teach-table">
      <thead>
        <tr>
          <th>#</th>
          <th>X (mm)</th>
          <th>Y (mm)</th>
          <th>Z (mm)</th>
          <th>V (mm/s)</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody class="teach-rows">
        <!-- rows get added here -->
      </tbody>
    </table>
  </div>

  <div class="teach-status"></div>
</div>
